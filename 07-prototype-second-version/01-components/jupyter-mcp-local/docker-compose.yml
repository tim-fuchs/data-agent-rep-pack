services:
  jupyter-mcp-local:
    image: datalayer/jupyter-mcp-server:latest
    container_name: jupyter-mcp-local
    env_file:
      - .env
    environment:
      JUPYTER_URL: ${JUPYTER_URL:?JUPYTER_URL must be set}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:?JUPYTER_TOKEN must be set}
      MCP_TOKEN: ${MCP_TOKEN:?MCP_TOKEN must be set}
    command:
      - --transport
      - streamable-http
      - --jupyter-token
      - ${JUPYTER_TOKEN}
      - --mcp-token 
      - ${MCP_TOKEN}
    ports:
      - ${MCP_PORT:?MCP_PORT must be set}:4040
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
