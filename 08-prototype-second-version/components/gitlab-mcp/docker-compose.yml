services:
  gitlab-mcp:
    image: zereight050/gitlab-mcp
    container_name: gitlab-mcp
    environment:
      HOST: 0.0.0.0
      GITLAB_PERSONAL_ACCESS_TOKEN: ${GITLAB_PERSONAL_ACCESS_TOKEN:?Missing GITLAB_PERSONAL_ACCESS_TOKEN. Set it in your environment before running docker compose.}
      GITLAB_API_URL: ${GITLAB_API_URL:?Missing GITLAB_API_URL. Set it in your environment before running docker compose.}
      GITLAB_READ_ONLY_MODE: "true"
      USE_GITLAB_WIKI: "true"
      USE_MILESTONE: "true"
      USE_PIPELINE: "true"
      STREAMABLE_HTTP: "true"
    ports:
      - "${MCP_PORT:?MCP_PORT must be set}:3002"
    restart: unless-stopped
