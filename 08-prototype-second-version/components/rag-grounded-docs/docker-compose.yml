services:
  grounded-docs:
    image: ghcr.io/arabold/docs-mcp-server:latest
    container_name: grounded-docs
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DOCS_MCP_EMBEDDING_MODEL: ${DOCS_MCP_EMBEDDING_MODEL:-}
      DOCS_MCP_APP_TELEMETRY_ENABLED: ${DOCS_MCP_APP_TELEMETRY_ENABLED:-}
    command:
      - --protocol
      - http
      - --host
      - 0.0.0.0
      - --port
      - "6280"
    ports:
      - "6280:6280"
    volumes:
      - ./data:/data
      - ./config:/config
    restart: unless-stopped
